<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ericsson | M.D. & CS Researcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-gradient { background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="glass max-w-2xl w-full rounded-2xl p-8 shadow-2xl transition-all hover:scale-[1.01]">
        
        <header class="text-center mb-10">
            <div class="inline-block p-1 rounded-full bg-gradient-to-tr from-cyan-400 to-indigo-500 mb-4">
                <div class="bg-[#0f172a] rounded-full p-2">
                    <i class="fas fa-user-md text-3xl text-cyan-400 px-3"></i>
                </div>
            </div>
            <h1 class="text-4xl font-bold mb-2">Ericsson</h1>
            <p class="text-lg font-medium accent-gradient tracking-wide uppercase">MD-CS Interdisciplinary Researcher</p>
        </header>

        <section class="mb-10 space-y-4 text-gray-300 leading-relaxed">
            <div class="flex items-start space-x-3">
                <span class="text-cyan-400 mt-1"><i class="fas fa-stethoscope"></i></span>
                <p><span class="text-white font-semibold">Medicine:</span> M.D. graduate from NCKU, medical intern background.</p>
            </div>
            <div class="flex items-start space-x-3">
                <span class="text-indigo-400 mt-1"><i class="fas fa-code"></i></span>
                <p><span class="text-white font-semibold">Tech:</span> MS CS student at NTU, specializing in AI/ML & Medical AI.</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <div class="glass rounded-lg p-4 flex items-center space-x-3">
                <i class="fab fa-github text-xl"></i>
                <span><a href="https://github.com/ericsson0408" class="hover:text-cyan-400 transition">GitHub Profile</a></span>
            </div>
            <div class="glass rounded-lg p-4 flex items-center space-x-3">
                <i class="fas fa-envelope text-xl text-red-400"></i>
                <span>Contact Me</span>
            </div>
        </div>

        <footer class="text-center text-sm text-gray-500 border-t border-gray-700 pt-6">
            <p>© 2026 Built with Tailwind CSS on GitHub Pages</p>
            <div class="mt-2 flex justify-center space-x-4">
                <span class="flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> System Online</span>
            </div>
        </footer>
    </div>

</body>
</html>
